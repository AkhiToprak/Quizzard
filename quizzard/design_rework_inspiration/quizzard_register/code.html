<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Quizzard AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @font-face {
            font-family: 'Gliker';
            src: url('https://fonts.cdnfonts.com/css/gliker') format('woff2'); /* Fallback to Plus Jakarta Sans for UI utility as per DS */
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d0d1a;
            color: #e5e3ff;
        }

        .font-shrikhand {
            font-family: 'Shrikhand', cursive;
            font-style: italic;
        }

        .font-gliker {
            font-family: 'Plus Jakarta Sans', sans-serif; /* Using PJS for form utility to ensure maximum legibility while maintaining the "friendly professional" tone */
            font-weight: 600;
        }

        .neon-glow {
            text-shadow: 0 0 20px rgba(174, 137, 255, 0.4);
        }

        .glass-panel {
            background: rgba(35, 35, 60, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary-dim": "#884efb",
                "background": "#0d0d1a",
                "secondary-fixed-dim": "#cbd2ff",
                "outline": "#737390",
                "on-error": "#490013",
                "surface-bright": "#292946",
                "on-primary-container": "#ffffff",
                "primary-fixed-dim": "#c1a4ff",
                "primary-fixed": "#cdb5ff",
                "surface-container-low": "#121222",
                "inverse-on-surface": "#545363",
                "surface-container-high": "#1d1d33",
                "surface-container-lowest": "#000000",
                "on-primary-fixed-variant": "#5600c4",
                "on-tertiary-container": "#5f4f00",
                "error-container": "#8a1632",
                "on-tertiary-fixed-variant": "#6a5800",
                "error": "#fd6f85",
                "tertiary-fixed": "#ffde59",
                "tertiary": "#ffedb3",
                "on-secondary-container": "#8b9eff",
                "on-primary-fixed": "#330079",
                "surface-container": "#18182a",
                "tertiary-fixed-dim": "#f0d04c",
                "on-tertiary-fixed": "#4a3d00",
                "secondary": "#b9c3ff",
                "error-dim": "#c8475d",
                "on-secondary-fixed-variant": "#274bdb",
                "surface-tint": "#ae89ff",
                "surface-container-highest": "#23233c",
                "surface-dim": "#0d0d1a",
                "outline-variant": "#464560",
                "on-tertiary": "#695700",
                "on-surface": "#e5e3ff",
                "on-primary": "#2a0066",
                "inverse-surface": "#fcf8ff",
                "secondary-fixed": "#dee1ff",
                "secondary-dim": "#4767f6",
                "surface": "#0d0d1a",
                "on-background": "#e5e3ff",
                "primary": "#ae89ff",
                "inverse-primary": "#7232e4",
                "on-surface-variant": "#aaa8c8",
                "tertiary-dim": "#f0d04c",
                "on-secondary-fixed": "#002db0",
                "tertiary-container": "#ffde59",
                "primary-container": "#8348f6",
                "on-error-container": "#ff97a3",
                "on-secondary": "#002eb2",
                "surface-variant": "#23233c",
                "secondary-container": "#001971"
              },
              fontFamily: {
                "headline": ["Shrikhand"],
                "body": ["Plus Jakarta Sans"],
                "label": ["Plus Jakarta Sans"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
<!-- Main Register Container -->
<div class="w-full max-w-[480px] z-10">
<!-- Header / Logo Area -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 mb-6 bg-surface-container-highest rounded-2xl flex items-center justify-center shadow-[0_0_40px_rgba(174,137,255,0.15)]">
<img alt="Quizzard AI Wizard Hat Logo" class="w-14 h-14 object-contain" data-alt="Stylized purple wizard hat icon with neon accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAEAcIzqpEU0rvgsbI6OXvjTBX8agZ76XVBXt_ECFUsu2peFSQPYNq4-KQd1XiYHnGnE8cxUlGGQb1sTEeiZPI17h2ZcRYFEjbTl38L0XAQA_UnlMaCwFsvD3sHqB3oFZuW69YZq9DisZC3xPIXUHXitg-Fd4Tli7VCi6KHMcmhLHjos6JddIJXaws9KeIUmNIwlD7HnmuPsHKOgpSfomuG6autwgZCU3izDriHXGcC_RC4jSMmDso44ZdmVJqIz1OTg-_f7zWdpMA"/>
</div>
<h1 class="font-shrikhand text-4xl md:text-5xl text-primary neon-glow tracking-tight text-center">
                Quizzard AI
            </h1>
<p class="text-on-surface-variant font-body mt-2 text-center text-lg">
                Join the Neon Scholar society.
            </p>
</div>
<!-- Card -->
<div class="glass-panel border-none rounded-[2rem] p-8 md:p-10 shadow-[0_32px_64px_rgba(0,0,0,0.4)]">
<h2 class="text-on-surface text-2xl font-bold mb-8 font-gliker">Create Account</h2>
<form class="space-y-6">
<!-- Name Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-secondary ml-1" for="name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full bg-surface-variant border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="name" name="name" placeholder="Alex Scholar" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-secondary ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-variant border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="email" name="email" placeholder="alex@neonscholar.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-secondary ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-variant border-none rounded-2xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/40 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 px-1">
<input class="mt-1 w-5 h-5 rounded border-none bg-surface-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
<label class="text-xs text-on-surface-variant leading-relaxed" for="terms">
                        I agree to the <a class="text-secondary hover:underline transition-all" href="#">Terms of Service</a> and <a class="text-secondary hover:underline transition-all" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold py-4 rounded-2xl shadow-[0_8px_24px_rgba(174,137,255,0.3)] hover:shadow-[0_12px_32px_rgba(174,137,255,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-all duration-300" type="submit">
                    Create Account
                </button>
</form>
<div class="mt-10 pt-8 border-t border-outline-variant/20 text-center">
<p class="text-on-surface-variant">
                    Already have an account? 
                    <a class="text-tertiary-fixed font-bold hover:text-tertiary transition-colors ml-1" href="/auth/login">Log In</a>
</p>
</div>
</div>
<!-- Footer Help -->
<div class="mt-8 flex justify-center gap-8 text-xs text-outline font-medium">
<a class="hover:text-on-surface transition-colors" href="#">Help Center</a>
<a class="hover:text-on-surface transition-colors" href="#">System Status</a>
<a class="hover:text-on-surface transition-colors" href="#">Contact Support</a>
</div>
</div>
<!-- Decorative Corner Element -->
<div class="fixed bottom-8 left-8 hidden lg:block">
<div class="flex items-center gap-4 text-secondary/30">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<div class="h-px w-24 bg-secondary/20"></div>
<span class="text-xs uppercase tracking-[0.2em] font-bold">Encrypted Session</span>
</div>
</div>
</body></html>
