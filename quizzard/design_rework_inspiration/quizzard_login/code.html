<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Shrikhand:ital@0;1&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'primary-dim': '#884efb',
              background: '#0d0d1a',
              'secondary-fixed-dim': '#cbd2ff',
              outline: '#737390',
              'on-error': '#490013',
              'surface-bright': '#292946',
              'on-primary-container': '#ffffff',
              'primary-fixed-dim': '#c1a4ff',
              'primary-fixed': '#cdb5ff',
              'surface-container-low': '#121222',
              'inverse-on-surface': '#545363',
              'surface-container-high': '#1d1d33',
              'surface-container-lowest': '#000000',
              'on-primary-fixed-variant': '#5600c4',
              'on-tertiary-container': '#5f4f00',
              'error-container': '#8a1632',
              'on-tertiary-fixed-variant': '#6a5800',
              error: '#fd6f85',
              'tertiary-fixed': '#ffde59',
              tertiary: '#ffedb3',
              'on-secondary-container': '#8b9eff',
              'on-primary-fixed': '#330079',
              'surface-container': '#18182a',
              'tertiary-fixed-dim': '#f0d04c',
              'on-tertiary-fixed': '#4a3d00',
              secondary: '#b9c3ff',
              'error-dim': '#c8475d',
              'on-secondary-fixed-variant': '#274bdb',
              'surface-tint': '#ae89ff',
              'surface-container-highest': '#23233c',
              'surface-dim': '#0d0d1a',
              'outline-variant': '#464560',
              'on-tertiary': '#695700',
              'on-surface': '#e5e3ff',
              'on-primary': '#2a0066',
              'inverse-surface': '#fcf8ff',
              'secondary-fixed': '#dee1ff',
              'secondary-dim': '#4767f6',
              surface: '#0d0d1a',
              'on-background': '#e5e3ff',
              primary: '#ae89ff',
              'inverse-primary': '#7232e4',
              'on-surface-variant': '#aaa8c8',
              'tertiary-dim': '#f0d04c',
              'on-secondary-fixed': '#002db0',
              'tertiary-container': '#ffde59',
              'primary-container': '#8348f6',
              'on-error-container': '#ff97a3',
              'on-secondary': '#002eb2',
              'surface-variant': '#23233c',
              'secondary-container': '#001971',
            },
            fontFamily: {
              headline: ['Shrikhand', 'serif'],
              body: ['Plus Jakarta Sans', 'sans-serif'],
              label: ['Plus Jakarta Sans', 'sans-serif'],
            },
            borderRadius: { DEFAULT: '0.25rem', lg: '0.5rem', xl: '0.75rem', full: '9999px' },
          },
        },
      };
    </script>
    <style>
      .shrikhand {
        font-family: 'Shrikhand', serif;
        font-style: italic;
      }
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
      /* Custom Gliker-like feel for inputs using weight and rounding */
      .gliker-style {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 600;
      }
      .bg-neon-glow {
        background: radial-gradient(
          circle at center,
          rgba(174, 137, 255, 0.15) 0%,
          rgba(13, 13, 26, 0) 70%
        );
      }
    </style>
  </head>
  <body
    class="bg-background text-on-background font-body min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden"
  >
    <div class="absolute inset-0 bg-neon-glow pointer-events-none"></div>
    <div class="w-full max-w-[480px] z-10">
      <div class="flex flex-col items-center mb-10">
        <div class="mb-6 relative">
          <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
          <img
            alt="Quizzard AI Wizard Hat Logo"
            class="w-24 h-24 relative object-contain"
            data-alt="Stylized purple wizard hat icon with neon glow"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPCCT-Trc5bAlEOie4qwatYeRBjPucJQL1gg_6cgfk_rsw4NIuuFbUj56e8qmYWvGjI3hR-dqNMjdvagCiTbUT7q53oDjb_CVGcdWrHs9WVScnaOcXx7zxnvitw_51e028Anf0Jn9jIlKJIfWf-1d1lvJcBvX-Zr34hjpD7SOQN9z8qnr5cfeIAT2CQVVpE0QwDQQ7XvQ_s_j80HRiSQzF8oTgitZzHcLaNdCF7z1RSdOYnxWnjXFmVZLDz4qWr_pxrq_Zz2y2-eg"
          />
        </div>
        <h1 class="shrikhand text-5xl text-primary tracking-tight mb-2">Welcome back</h1>
        <p class="text-on-surface-variant text-lg">Continue your quest for knowledge.</p>
      </div>
      <div
        class="bg-surface-container-low p-10 rounded-[2rem] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.5)] border border-outline-variant/10 relative overflow-hidden"
      >
        <div
          class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/40 to-transparent"
        ></div>
        <form class="space-y-6">
          <div>
            <label class="block text-sm font-bold text-secondary mb-2 px-1" for="email"
              >Email Address</label
            >
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline"
              >
                <span class="material-symbols-outlined text-lg">mail</span>
              </div>
              <input
                class="gliker-style block w-full pl-11 pr-4 py-4 bg-surface-variant border-none rounded-2xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all duration-300"
                id="email"
                placeholder="scholar@quizzard.ai"
                type="email"
              />
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-secondary mb-2 px-1" for="password"
              >Password</label
            >
            <div class="relative group">
              <div
                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline"
              >
                <span class="material-symbols-outlined text-lg">lock</span>
              </div>
              <input
                class="gliker-style block w-full pl-11 pr-12 py-4 bg-surface-variant border-none rounded-2xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/40 transition-all duration-300"
                id="password"
                placeholder="••••••••"
                type="password"
              />
              <button
                class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined text-lg">visibility</span>
              </button>
            </div>
            <div class="flex justify-end mt-3">
              <a
                class="text-sm font-bold text-primary-fixed-dim hover:text-primary transition-colors"
                href="#"
                >Forgot Password?</a
              >
            </div>
          </div>
          <div class="pt-2">
            <button
              class="w-full py-4 bg-gradient-to-br from-primary to-primary-dim text-on-primary font-extrabold text-lg rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2"
              type="submit"
            >
              Log In
              <span class="material-symbols-outlined">auto_awesome</span>
            </button>
          </div>
        </form>
        <div class="mt-10 flex items-center gap-4">
          <div class="h-px flex-1 bg-outline-variant/20"></div>
          <span class="text-xs font-bold text-outline uppercase tracking-widest"
            >Or continue with</span
          >
          <div class="h-px flex-1 bg-outline-variant/20"></div>
        </div>
        <div class="mt-8 grid grid-cols-2 gap-4">
          <button
            class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-colors border border-outline-variant/5"
          >
            <img
              alt="Google Logo"
              class="w-5 h-5"
              data-alt="Google colorful G logo"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQDgB1zJLZfq02GrqUow6kn6eyoHotJEAZ3qZ_4dNlVX9uU8OXeISmdCvGz1xoAUhtZwr8UewIqRRr2Uklfv2umhlkAJgV-RcJAeB--2lEWldzfgU1lxHlUv3eyii_t-SXknuYOZiWNt92l7eXKO5upqUzAMQ5vImucuHUHwXYMoozg2vjUOiX-PZH_Ca69_8-R6gzOaXC6tTQTWzi1749wvzViqCOjrBd9RwTnY8iU-KSBpyAl3p-7_QgPvDUQJhvDkTmgyCpxQ0"
            />
            <span class="font-bold text-sm">Google</span>
          </button>
          <button
            class="flex items-center justify-center gap-3 py-3 px-4 bg-surface-container-high rounded-xl hover:bg-surface-container-highest transition-colors border border-outline-variant/5"
          >
            <span class="material-symbols-outlined text-on-surface">brand_family</span>
            <span class="font-bold text-sm">Apple</span>
          </button>
        </div>
      </div>
      <div class="mt-10 text-center">
        <p class="text-on-surface-variant">
          Don't have an account?
          <a
            class="text-tertiary-fixed font-black ml-1 hover:underline underline-offset-4 decoration-2"
            href="/auth/signup"
            >Sign Up</a
          >
        </p>
      </div>
      <footer
        class="mt-16 flex justify-center gap-8 text-xs font-bold text-outline/40 uppercase tracking-widest"
      >
        <a class="hover:text-outline transition-colors" href="#">Privacy Policy</a>
        <a class="hover:text-outline transition-colors" href="#">Terms of Service</a>
        <a class="hover:text-outline transition-colors" href="#">Help Center</a>
      </footer>
    </div>
    <div
      class="fixed bottom-0 left-0 w-full h-32 bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"
    ></div>
  </body>
</html>
