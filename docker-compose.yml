

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
      - "3010:3000"
    volumes:
      - ./quizzard:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PRISMA_QUERY_ENGINE_LIBRARY=/app/node_modules/.prisma/client/libquery_engine-linux-musl-arm64-openssl-3.0.x.so.node
      - DATABASE_URL=postgresql://notemage:dev_password@db:5432/notemage_dev?schema=public
    command: npm run dev
    stdin_open: true
    tty: true

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: notemage
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: notemage_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notemage -d notemage_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@notemage.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

volumes:
  postgres_data:
